<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* CSSアニメーションの設定 */
    img {
      &.korokoro {
        animation: korokoro 2.5s linear 0s 1;
      }
    }

    @keyframes korokoro {
      0%   { transform: none; }
      5%   { transform: translateX( 10%) rotate( 10deg); }
      25%  { transform: translateX( 20%) rotate( 20deg); }
      30%  { transform: translateX(-10%) rotate(-10deg); }
      35%  { transform: translateX(-15%) rotate(-15deg); }
      45%  { transform: translateX( 10%) rotate( 10deg); }
      50%  { transform: translateX( 15%) rotate( 15deg); }
      60%  { transform: translateX( -5%) rotate( -5deg); }
      65%  { transform: translateX( -7%) rotate( -7deg); }
      75%  { transform: none; }
      100% { transform: none; }
    }
  </style>
  <script src="js/common.js"></script>
</head>
<body>
  <div class="shadow"></div>
  <img id="mitarashi" class="demo-object korokoro" src="images/mitarashi.png" width="200" height="200" />
  <script>
    // ID値「mitarashi」に対してCSSアニメ―ション「korokoro」を100ミリ秒の間隔を空けてループ再生
    looopAnimation("mitarashi", "korokoro", 100);
  </script>
</body>
</html>
