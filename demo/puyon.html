<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* CSSアニメーションの設定 */
    img {
      &.puyon {
        animation: puyon 1.0s linear 0s 1;
      }
    }

    @keyframes puyon {
      0%   { transform: none; }
      40%  { transform: scale(0.95, 1.2 ) translateY(-10%); }
      50%  { transform: scale(1.1,  0.9 ) translateY(  5%); }
      60%  { transform: scale(0.95, 1.05) translateY( -3%); }
      70%  { transform: scale(1.05, 0.95) translateY(  3%); }
      80%  { transform: none; }
      100% { transform: none; }
    }
  </style>
  <script src="js/common.js"></script>
</head>
<body>
  <div class="shadow"></div>
  <img id="mitarashi" class="demo-object puyon" src="images/mitarashi.png" width="200" height="200" />
  <script>
    // ID値「mitarashi」に対してCSSアニメ―ション「puyon」を400ミリ秒の間隔を空けてループ再生
    looopAnimation("mitarashi", "puyon", 400);
  </script>
</body>
</html>
