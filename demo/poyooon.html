<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* CSSアニメーションの設定 */
    img {
      &.poyooon {
        animation: poyooon 0.9s linear 0s 1;
      }
    }

    @keyframes poyooon {
      0%   { transform: none; }
      10%  { transform: scale(1.1, 0.9) translateY(   5%); }
      40%  { transform: scale(1.2, 0.8) translateY(  15%); }
      50%  { transform: none; }
      60%  { transform: scale(0.9, 1.2) translateY(-100%); }
      75%  { transform: scale(0.9, 1.2) translateY( -20%); }
      85%  { transform: scale(1.2, 0.8) translateY(  15%); }
      100% { transform: none; }
    }
  </style>
  <script src="js/common.js"></script>
</head>
<body>
  <div class="shadow"></div>
  <img id="mitarashi" class="demo-object poyooon" src="images/mitarashi.png" width="200" height="200" />
  <script>
    // ID値「mitarashi」に対してCSSアニメ―ション「poyooon」を600ミリ秒の間隔を空けてループ再生
    looopAnimation("mitarashi", "poyooon", 600);
  </script>
</body>
</html>
