<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* CSSアニメーションの設定 */
    img {
      &.poyon {
        animation: poyon 1.1s linear 0s 1;
      }
    }

    @keyframes poyon {
      0%   { transform: scale(0.8 , 1.4) translateY(-100%); }
      10%  { transform: scale(0.8 , 1.4) translateY( -15%); }
      20%  { transform: scale(1.4 , 0.6) translateY(  30%); }
      30%  { transform: scale(0.9 , 1.1) translateY( -10%); }
      40%  { transform: scale(0.95, 1.2) translateY( -30%); }
      50%  { transform: scale(0.95, 1.2) translateY( -10%); }
      60%  { transform: scale(1.1 , 0.9) translateY(   5%); }
      70%  { transform: none; }
      100% { transform: none; }
    }
  </style>
  <script src="js/common.js"></script>
</head>
<body>
  <div class="shadow"></div>
  <img id="mitarashi" class="demo-object poyon" src="images/mitarashi.png" width="200" height="200" />
  <script>
    // ID値「mitarashi」に対してCSSアニメ―ション「poyon」を300ミリ秒の間隔を空けてループ再生
    looopAnimation("mitarashi", "poyon", 300);
  </script>
</body>
</html>
