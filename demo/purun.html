<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* CSSアニメーションの設定 */
    img {
      &.purun {
        animation: purun 0.8s linear 0s 1;
      }
    }

    @keyframes purun {
      0%   { transform: none; }
      15%  { transform: scale(0.9, 0.9) translateY(  5%); }
      30%  { transform: scale(1.3, 0.8) translateY( 10%); }
      50%  { transform: scale(0.8, 1.3) translateY(-10%); }
      70%  { transform: scale(1.1, 0.9) translateY(  5%); }
      100% { transform: none; }
    }
  </style>
  <script src="js/common.js"></script>
</head>
<body>
  <div class="shadow"></div>
  <img id="mitarashi" class="demo-object purun" src="images/mitarashi.png" width="200" height="200" />
  <script>
    // ID値「mitarashi」に対してCSSアニメ―ション「purun」を600ミリ秒の間隔を空けてループ再生
    looopAnimation("mitarashi", "purun", 600);
  </script>
</body>
</html>
