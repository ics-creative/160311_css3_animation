<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* CSSアニメーションの設定 */
    img {
      &.pururun {
        animation: pururun 1.2s linear 0.2s 1;
      }
    }

    @keyframes pururun {
      0%   { transform: none; }
      10%  { transform: translateX( 10%) skewX(-10deg); }
      60%  { transform: translateX( 20%) skewX(-20deg); }
      70%  { transform: translateX(-15%) skewX( 15deg); }
      80%  { transform: translateX( 15%) skewX(-15deg); }
      80%  { transform: translateX(  5%) skewX( -5deg); }
      90%  { transform: translateX( -5%) skewX(  5deg); }
      100% { transform: none; }
    }
  </style>
  <script src="js/common.js"></script>
</head>
<body>
  <div class="shadow"></div>
  <img id="mitarashi" class="demo-object pururun" src="images/mitarashi.png" width="200" height="200" />
  <script>
    // ID値「mitarashi」に対してCSSアニメ―ション「pururun」を600ミリ秒の間隔を空けてループ再生
    looopAnimation("mitarashi", "pururun", 600);
  </script>
</body>
</html>
