<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* CSSアニメーションの設定 */
    img {
      &.purupuru {
        animation: purupuru 0.8s linear 0s 1;
      }
    }

    @keyframes purupuru {
      0%   { transform: none; }
      20%  { transform: scaleY(1.06) translate(-5%, -4%) skewX( 6deg); }
      50%  { transform: scaleY(0.94) translate( 5%,  4%) skewX(-6deg); }
      65%  { transform: scaleY(1.03) translate( 2%, -2%) skewX(-3deg); }
      80%  { transform: scaleY(0.97) translate(-2%,  2%) skewX( 3deg); }
      100% { transform: none; }
    }
  </style>
  <script src="js/common.js"></script>
</head>
<body>
  <div class="shadow"></div>
  <img id="mitarashi" class="demo-object purupuru" src="images/mitarashi.png" width="200" height="200" />
  <script>
    // ID値「mitarashi」に対してCSSアニメ―ション「purupuru」を800ミリ秒の間隔を空けてループ再生
    looopAnimation("mitarashi", "purupuru", 800);
  </script>
</body>
</html>
